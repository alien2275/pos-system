services:
  postgres:
    image: postgres:17
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos
      POSTGRES_USER: Alien2275
      POSTGRES_PASSWORD: Ak8pch1001a
      TZ: America/New_York
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: pos-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
    container_name: pos-backend
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos
      POSTGRES_USER: Alien2275
      POSTGRES_PASSWORD: Ak8pch1001a
      POSTGRES_HOST: postgres
      STORE_TIMEZONE: America/New_York
      TZ: America/New_York
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-me-session-secret}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    image: node:22
    container_name: pos-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:
